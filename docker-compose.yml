# Exemple Docker Compose pour Proxmox Datacenter Manager.
# Lancer avec : docker compose up -d
services:
  pdm:
    image: ghcr.io/williamboglietti/proxmox-datacenter-manager:latest
    # En développement local, commenter l'image ci-dessus et décommenter :
    # build: .
    container_name: pdm
    platform: linux/amd64           # PDM est disponible en amd64 uniquement
    restart: unless-stopped
    ports:
      - "8443:8443"                 # UI web HTTPS
    environment:
      # Mot de passe root@pam, appliqué au premier démarrage. À changer.
      PDM_ROOT_PASSWORD: "change-me"
      # Masquer le popup "Aucun abonnement en cours de validité" (true/false).
      DISABLE_SUBSCRIPTION_NAG: "false"
      # Désactiver le dépôt apt enterprise (évite les 401 sur `apt update`
      # sans abonnement Proxmox) (true/false).
      DISABLE_ENTERPRISE_REPO: "false"
      # Port HTTPS de l'UI (laisser 8443 sauf besoin spécifique).
      # PDM_PORT: "8443"
    # Alternative : déporter les variables ci-dessus dans un fichier .env
    # env_file:
    #   - .env
    volumes:
      - pdm-config:/etc/proxmox-datacenter-manager   # config, certificats, clés
      - pdm-data:/var/lib/proxmox-datacenter-manager # état, base de données

volumes:
  pdm-config:
  pdm-data:
