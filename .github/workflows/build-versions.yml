name: Build historical PDM versions

# Build reproductible d'anciennes versions PDM avec nos patches conteneur.
# Déclenché manuellement. Chaque version est buildée via --build-arg PDM_VERSION
# (le Dockerfile pinne le paquet principal et choisit la -ui/-docs <= version).
# Publie le tag exact X.Y.Z + l'alias minor X.Y (sur le patch le plus haut de la
# série demandée). NE touche PAS à `latest` (géré par docker-publish.yml).

on:
  workflow_dispatch:
    inputs:
      versions:
        description: "Versions PDM à builder (séparées par des virgules)"
        default: "1.0.0,1.0.1,1.0.2,1.0.3,1.0.4,1.0.5,1.0.6,1.0.7,1.1.1,1.1.3,1.1.4"

env:
  IMAGE_NAME: proxmox-datacenter-manager

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          set -euo pipefail
          JSON=$(echo "${{ github.event.inputs.versions }}" \
            | tr ',' '\n' | sed 's/[[:space:]]//g' | grep -v '^$' \
            | jq -R . | jq -s -c .)
          echo "matrix=$JSON" >> "$GITHUB_OUTPUT"
          echo "Versions : $JSON"

  build-push:
    needs: prep
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        version: ${{ fromJSON(needs.prep.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image (load locally, no push yet)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: pdm-ci:build
          build-args: |
            PDM_VERSION=${{ matrix.version }}
          cache-from: type=gha,scope=${{ matrix.version }}
          cache-to: type=gha,mode=max,scope=${{ matrix.version }}

      - name: Verify installed PDM version matches the request
        run: |
          set -euo pipefail
          GOT=$(docker run --rm --entrypoint dpkg-query pdm-ci:build \
            -W -f='${Version}' proxmox-datacenter-manager)
          GOT=${GOT%%[-+]*}
          if [ "$GOT" != "${{ matrix.version }}" ]; then
            echo "::error::Image embarque PDM $GOT, attendu ${{ matrix.version }}."
            exit 1
          fi
          echo "OK : PDM $GOT"

      - name: Tag & push (version exacte uniquement)
        env:
          GHCR: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          DH: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          V: ${{ matrix.version }}
        run: |
          set -euo pipefail
          # Tags X.Y.Z exacts seulement. Les alias mobiles (latest, X.Y) sont la
          # propriété exclusive de docker-publish.yml : aucun chevauchement, donc
          # pas de course entre workflows sur ces tags.
          TAGS="$V"
          echo "Tags poussés pour PDM $V : $TAGS"
          for reg in "$GHCR" "$DH"; do
            for t in $TAGS; do
              docker tag pdm-ci:build "$reg:$t"
              docker push "$reg:$t"
            done
          done
